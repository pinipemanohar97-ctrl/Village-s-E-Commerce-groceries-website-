<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Village Mart Advanced</title>

<style>
body { font-family: Arial; margin:0; background:#f5f5f5; }

header {
    background:#2e7d32;
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
}

/* Search */
.search-box {
    padding:10px;
    text-align:center;
}
input {
    padding:10px;
    width:80%;
    font-size:16px;
}

/* Categories */
.categories {
    display:flex;
    justify-content:space-around;
    padding:10px;
}
.categories button {
    padding:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    background:#ddd;
}

/* Products */
.products {
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    padding:10px;
}

.card {
    background:white;
    padding:10px;
    border-radius:10px;
    text-align:center;
}

button {
    padding:8px;
    margin-top:5px;
    width:100%;
    background:#ff9800;
    border:none;
    border-radius:6px;
    color:white;
}

/* Cart */
.cart {
    background:black;
    color:white;
    padding:10px;
    position:fixed;
    bottom:0;
    width:100%;
    text-align:center;
}

/* Order Form */
.form {
    display:none;
    background:white;
    padding:15px;
}
.form input {
    width:95%;
    margin:5px 0;
}
</style>
</head>

<body>

<header>🛒 Village Mart</header>

<div class="search-box">
<input type="text" placeholder="Search..." onkeyup="searchItem(this.value)">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('veg')">Vegetables</button>
<button onclick="filterCategory('fruit')">Fruits</button>
</div>

<div class="products" id="products"></div>

<div class="form" id="orderForm">
<h3>Enter Details</h3>
<input type="text" id="name" placeholder="Name">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="address" placeholder="Address">
<button onclick="placeOrder()">Confirm Order</button>
</div>

<div class="cart">
🧺 Items: <span id="count">0</span> | ₹<span id="total">0</span>
<br>
<button onclick="showForm()">Order</button>
</div>

<script>
let items = [
    {name:"Potato", price:20, category:"veg"},
    {name:"Tomato", price:25, category:"veg"},
    {name:"Onion", price:30, category:"veg"},
    {name:"Banana", price:40, category:"fruit"}
];

let cart = {};

function displayProducts(list) {
    let html = "";
    list.forEach(item => {
        html += `
        <div class="card">
            ${item.name}<br>₹${item.price}
            <button onclick="addItem('${item.name}',${item.price})">Add</button>
        </div>`;
    });
    document.getElementById("products").innerHTML = html;
}

function addItem(name, price) {
    if(cart[name]) {
        cart[name].qty++;
    } else {
        cart[name] = {price:price, qty:1};
    }
    updateCart();
}

function updateCart() {
    let count = 0, total = 0;
    for(let item in cart) {
        count += cart[item].qty;
        total += cart[item].qty * cart[item].price;
    }
    document.getElementById("count").innerText = count;
    document.getElementById("total").innerText = total;
}

function searchItem(text) {
    let filtered = items.filter(i => i.name.toLowerCase().includes(text.toLowerCase()));
    displayProducts(filtered);
}

function filterCategory(cat) {
    if(cat === "all") {
        displayProducts(items);
    } else {
        let filtered = items.filter(i => i.category === cat);
        displayProducts(filtered);
    }
}

function showForm() {
    document.getElementById("orderForm").style.display = "block";
}

function placeOrder() {
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let address = document.getElementById("address").value;

    let order = "Order:\n";
    for(let item in cart) {
        order += item + " x" + cart[item].qty + "\n";
    }

    order += "\nName: " + name;
    order += "\nPhone: " + phone;
    order += "\nAddress: " + address;

    let url = "https://wa.me/91XXXXXXXXXX?text=" + encodeURIComponent(order);
    window.open(url, "_blank");
}

displayProducts(items);
</script>

</body>
</html>
